<html lang="en">
<head>

<!-- Color scheme -->
<meta name="color-scheme" content="light dark" />

<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0b0e" />

<!-- Icons -->
<link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="images/favicon/favicon-180.png" />

<!-- Self-hosted fonts (no external CDN) -->
<link rel="preload" href="fonts/geist-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="fonts/geist-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="base.css" />
<style>
  /* Shared foundation (fonts + theme tokens + reset) lives in base.css */
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Geist", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* ---------- cursor-following gradient spotlight ---------- */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  /* a static, faint colored field that always sits in the page */
  .bg::before {
    content: "";
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(38% 42% at 26% 30%, var(--accent) 0%, transparent 62%),
      radial-gradient(40% 44% at 78% 72%, var(--accent2) 0%, transparent 64%);
    opacity: calc(var(--glow) * 0.32);
    filter: blur(30px) saturate(115%);
    transition: opacity 0.4s ease;
  }
  /* the same field, far brighter, revealed only around the cursor */
  .bg-field {
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(38% 42% at 26% 30%, var(--accent) 0%, transparent 60%),
      radial-gradient(44% 48% at 80% 74%, var(--accent2) 0%, transparent 62%),
      radial-gradient(60% 60% at 50% 58%, color-mix(in oklch, var(--accent), var(--accent2)) 0%, transparent 72%);
    opacity: var(--glow);
    filter: blur(18px) saturate(135%);
    -webkit-mask-image: radial-gradient(circle var(--reveal) at var(--mx, 50%) var(--my, 42%), #000 0%, rgba(0,0,0,0.35) 42%, transparent 72%);
    mask-image: radial-gradient(circle var(--reveal) at var(--mx, 50%) var(--my, 42%), #000 0%, rgba(0,0,0,0.35) 42%, transparent 72%);
    transition: opacity 0.4s ease;
    will-change: mask-position;
  }
  /* a vignette to keep edges grounded */
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 120% at 50% 50%, transparent 40%, var(--bg-deep) 100%);
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-field { -webkit-mask-image: none; mask-image: none; opacity: calc(var(--glow) * 0.5); }
  }

  /* ---------- layout ---------- */
  main {
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: clamp(2rem, 5vh, 3.5rem);
    padding: clamp(2rem, 7vw, 8rem);
    max-width: 760px;
  }

  .intro { display: flex; flex-direction: column; gap: 0.9rem; }
  .eyebrow {
    font-family: "Geist Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .eyebrow::before {
    content: "";
    width: 26px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  h1 {
    font-size: clamp(2.6rem, 8vw, 4.9rem);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.98;
    text-wrap: balance;
  }
  .tagline {
    font-size: clamp(1.05rem, 2.4vw, 1.35rem);
    font-weight: 400;
    color: var(--text-weak);
    max-width: 42ch;
    line-height: 1.45;
    text-wrap: pretty;
  }

  /* ---------- links ---------- */
  .links {
    display: grid;
    gap: 0.65rem;
    width: 100%;
    max-width: 460px;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.95rem 1.1rem;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    backdrop-filter: blur(6px);
    transition: transform 0.22s cubic-bezier(.2,.7,.3,1), border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
    position: relative;
  }
  .link:hover {
    transform: translateY(-2px);
    background: var(--surface-hover);
    border-color: color-mix(in oklch, var(--accent) 55%, var(--border));
    box-shadow: 0 10px 34px -16px color-mix(in oklch, var(--accent) 70%, transparent);
  }
  .link-icon {
    flex: none;
    width: 38px; height: 38px;
    display: grid;
    place-items: center;
    border-radius: 10px;
    background: color-mix(in oklch, var(--accent) 12%, transparent);
    color: var(--accent);
    transition: background 0.22s ease, color 0.22s ease;
  }
  .link:hover .link-icon {
    background: var(--accent);
    color: var(--on-accent);
  }
  .link-icon svg { width: 19px; height: 19px; display: block; }
  .link-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
  .link-label {
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .link-value {
    font-family: "Geist Mono", monospace;
    font-size: 0.78rem;
    color: var(--text-weak);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-arrow {
    margin-left: auto;
    flex: none;
    color: var(--text-faint);
    transition: transform 0.22s ease, color 0.22s ease;
  }
  .link:hover .link-arrow {
    color: var(--accent);
    transform: translate(2px, -2px);
  }
  .link-arrow svg { width: 16px; height: 16px; display: block; }

  /* ---------- email row: stretched link + copy button ---------- */
  .row-stretch {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: 1;
  }
  .copy-btn {
    position: relative;
    z-index: 2;
    flex: none;
    width: 34px; height: 34px;
    display: grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: transparent;
    color: var(--text-faint);
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .copy-btn:hover {
    color: var(--accent);
    border-color: color-mix(in oklch, var(--accent) 50%, var(--border));
    background: color-mix(in oklch, var(--accent) 10%, transparent);
  }
  .copy-btn svg { width: 16px; height: 16px; display: block; }
  .copy-btn .ico-check { display: none; color: var(--accent); }
  .copy-btn.copied .ico-copy { display: none; }
  .copy-btn.copied .ico-check { display: block; }
  .copy-btn.copied {
    color: var(--accent);
    border-color: color-mix(in oklch, var(--accent) 55%, var(--border));
    background: color-mix(in oklch, var(--accent) 12%, transparent);
  }
  .copy-toast {
    position: absolute;
    right: 5.3rem;
    top: 50%;
    transform: translate(6px, -50%);
    z-index: 2;
    pointer-events: none;
    font-family: "Geist Mono", monospace;
    font-size: 0.7rem;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: var(--bg);
    padding: 0 0.45rem;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .link.show-toast .copy-toast {
    opacity: 1;
    transform: translate(0, -50%);
  }

  footer {
    position: fixed;
    left: clamp(2rem, 7vw, 8rem);
    bottom: clamp(1.4rem, 4vh, 2.4rem);
    z-index: 1;
    font-family: "Geist Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }
  footer a {
    color: var(--text-faint);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  footer a:hover { color: var(--accent); }
  .footer-sep { opacity: 0.5; margin: 0 0.5rem; }

  @media (max-width: 560px) {
    footer { position: static; margin-top: 1rem; padding: 0 clamp(2rem,7vw,8rem); }
    body { overflow-y: auto; }
  }
</style>
</head>

  <!-- cursor spotlight + copy fallback -->
  <script>
    (function () {
      document.getElementById("year").textContent = new Date().getFullYear();
      const root = document.documentElement;
      let tx = 50, ty = 42, cx = 50, cy = 42, raf = null;
      function loop() {
        cx += (tx - cx) * 0.12;
        cy += (ty - cy) * 0.12;
        root.style.setProperty("--mx", cx.toFixed(2) + "%");
        root.style.setProperty("--my", cy.toFixed(2) + "%");
        if (Math.abs(tx - cx) > 0.05 || Math.abs(ty - cy) > 0.05) {
          raf = requestAnimationFrame(loop);
        } else { raf = null; }
      }
      function move(x, y) {
        tx = (x / window.innerWidth) * 100;
        ty = (y / window.innerHeight) * 100;
        if (!raf) raf = requestAnimationFrame(loop);
      }
      window.addEventListener("pointermove", (e) => move(e.clientX, e.clientY), { passive: true });
      window.addEventListener("pointerdown", (e) => move(e.clientX, e.clientY), { passive: true });
      root.style.setProperty("--mx", "50%");
      root.style.setProperty("--my", "42%");

      // copy-to-clipboard fallback on the email row
      document.querySelectorAll(".copy-btn").forEach((btn) => {
        let timer = null;
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          e.stopPropagation();
          const text = btn.getAttribute("data-copy");
          try {
            await navigator.clipboard.writeText(text);
          } catch (err) {
            const ta = document.createElement("textarea");
            ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            try { document.execCommand("copy"); } catch (e2) {}
            document.body.removeChild(ta);
          }
          const row = btn.closest(".link");
          btn.classList.add("copied");
          if (row) row.classList.add("show-toast");
          clearTimeout(timer);
          timer = setTimeout(() => {
            btn.classList.remove("copied");
            if (row) row.classList.remove("show-toast");
          }, 1500);
        });
      });
    })();
  </script>
