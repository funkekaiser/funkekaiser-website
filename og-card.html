<!DOCTYPE html>
<!--
  Source for images/og-card.png (1200×630 Open Graph / Twitter card).
  To re-export after editing: open at exactly 1200×630 and screenshot the
  #card element (e.g. via headless Chrome), then save as images/og-card.png.
  Fonts are self-hosted to match the rest of the site (no Google CDN).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex" />
<title>OG Card — Jonathan Funke-Kaiser</title>
<style>
  /* ---------- self-hosted fonts (Geist + Geist Mono, variable) ---------- */
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url("fonts/geist-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url("fonts/geist-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: swap;
    src: url("fonts/geist-mono-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: swap;
    src: url("fonts/geist-mono-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  :root {
    --accent: #9a7bff;
    --accent2: #3fd2c7;
    --bg: #0a0b0e;
    --bg-deep: #060709;
    --text: #eceef2;
    --text-weak: #9aa0aa;
    --text-faint: #6a7079;
    --border: rgba(255, 255, 255, 0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000;
    font-family: "Geist", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* 1200 x 630 fixed OG canvas */
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 86px 96px;
  }

  /* spotlight gradient field, lifted toward the right where there's open space */
  .card::before {
    content: "";
    position: absolute;
    inset: -12%;
    background:
      radial-gradient(34% 46% at 18% 24%, var(--accent) 0%, transparent 60%),
      radial-gradient(40% 52% at 88% 80%, var(--accent2) 0%, transparent 62%),
      radial-gradient(46% 50% at 74% 30%, color-mix(in oklch, var(--accent), var(--accent2)) 0%, transparent 70%);
    opacity: 0.42;
    filter: blur(26px) saturate(130%);
  }
  /* vignette grounding the edges */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 120% at 50% 46%, transparent 38%, var(--bg-deep) 100%);
    pointer-events: none;
  }
  /* fine grid texture */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(120% 120% at 50% 50%, #000 30%, transparent 86%);
    mask-image: radial-gradient(120% 120% at 50% 50%, #000 30%, transparent 86%);
  }

  .content { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 30px; max-width: 880px; }

  .eyebrow {
    font-family: "Geist Mono", monospace;
    font-size: 19px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .eyebrow::before {
    content: "";
    width: 46px; height: 2px;
    background: var(--accent);
    display: inline-block;
    border-radius: 2px;
  }

  h1 {
    font-size: 116px;
    font-weight: 600;
    letter-spacing: -0.04em;
    line-height: 0.94;
    text-wrap: balance;
  }
  .tagline {
    font-size: 31px;
    font-weight: 400;
    color: var(--text-weak);
    max-width: 30ch;
    line-height: 1.4;
    text-wrap: pretty;
  }

  /* bottom meta row, pinned */
  .meta {
    position: absolute;
    left: 96px;
    right: 96px;
    bottom: 56px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "Geist Mono", monospace;
    font-size: 20px;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }
  .meta .handles { display: flex; align-items: center; gap: 22px; }
  .meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); display: inline-block; }
  .meta .site { color: var(--text-weak); }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="grid"></div>
    <div class="content">
      <p class="eyebrow">Computer Science · Data Science</p>
      <h1>Jonathan<br />Funke-Kaiser</h1>
      <p class="tagline">Studying Computer Science, with a focus on Data Science.</p>
    </div>
    <div class="meta">
      <span class="site">funkekaiser.com</span>
      <span class="handles">
        <span>github.com/funkekaiser</span>
        <span class="dot"></span>
        <span>in/funkekaiser</span>
      </span>
    </div>
  </div>
</body>
</html>
