<!DOCTYPE html>
<!--
  Source for images/og-card.png (1200×630 Open Graph / Twitter card).
  To re-export after editing: open at exactly 1200×630 and screenshot the
  #card element (e.g. via headless Chrome), then save as images/og-card.png.
  Fonts are self-hosted to match the rest of the site (no Google CDN).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex" />
<title>OG Card — Jonathan Funke-Kaiser</title>
<style>
  /* ---------- self-hosted fonts (Geist + Geist Mono, variable) ---------- */
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: block;
    src: url("fonts/geist-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: block;
    src: url("fonts/geist-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: block;
    src: url("fonts/geist-mono-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: block;
    src: url("fonts/geist-mono-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  :root {
    --bg:         #f4f4f1;
    --text:       #131311;
    --text-weak:  #3a3834;
    --text-faint: #6b6762;
    --border:     rgba(19, 19, 17, 0.13);
    --c0: #a04a31;
    --c1: #2f7a4e;
    --c2: #4763ad;
    --c3: #91487d;
    --c4: #7c662a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    font-family: "Geist", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* 1200 × 630 fixed OG canvas */
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 96px;
  }

  /* scatter canvas — fills the card, drawn from JS */
  #scatter {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 630px;
  }

  /* soft vignette grounds the edges without heavy gradients */
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(115% 115% at 44% 48%,
      transparent 42%,
      rgba(244, 244, 241, 0.55) 68%,
      rgba(244, 244, 241, 0.88) 100%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 820px;
  }

  /* "Hello, I'm" — topmost greeting, matches site eyebrow */
  .greeting {
    font-family: "Geist Mono", monospace;
    font-size: 17px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 26px;
  }
  .greeting::before {
    content: "";
    width: 38px;
    height: 1px;
    background: var(--text-faint);
    display: inline-block;
    opacity: 0.55;
  }

  h1 {
    font-size: 112px;
    font-weight: 600;
    letter-spacing: -0.042em;
    line-height: 0.93;
    color: var(--text);
  }

  .tagline {
    font-size: 30px;
    font-weight: 400;
    color: var(--text-weak);
    white-space: nowrap;
    margin-top: 22px;
  }

  /* bottom meta row */
  .meta {
    position: absolute;
    left: 96px;
    right: 96px;
    bottom: 50px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "Geist Mono", monospace;
    font-size: 17px;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }

  /* hairline link-chip row (site's link-list aesthetic) */
  .handles {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .handle {
    padding: 7px 15px;
    border: 1px solid var(--border);
    font-size: 15px;
    letter-spacing: 0.03em;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .handle:first-child { border-radius: 8px 0 0 8px; }
  .handle:last-child  { border-radius: 0 8px 8px 0; }
  .handle + .handle   { border-left: none; }
</style>
</head>
<body>
  <div class="card" id="card">
    <canvas id="scatter"></canvas>
    <div class="content">
      <p class="greeting">Hello, I'm</p>
      <h1>Jonathan<br />Funke-Kaiser</h1>
      <p class="tagline">Computer Science student &amp; aspiring Data Scientist</p>
    </div>
    <div class="meta">
      <span class="site">funkekaiser.com</span>
      <div class="handles">
        <span class="handle">github.com/funkekaiser</span>
        <span class="handle">in/funkekaiser</span>
      </div>
    </div>
  </div>

  <script>
    /* k-means cluster scatter — five accent clusters placed in the margins
       so they frame the text without overlapping it. Uses a deterministic
       LCG so the output is stable across re-renders. */
    (function () {
      const canvas = document.getElementById("scatter");
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext("2d");

      /* deterministic LCG (Park–Miller) */
      let seed = 1277;
      function rand() {
        seed = (seed * 16807) % 2147483647;
        return (seed - 1) / 2147483646;
      }
      /* Box–Muller normal sample */
      function randn() {
        return Math.sqrt(-2 * Math.log(rand() + 1e-9)) * Math.cos(2 * Math.PI * rand());
      }

      /* five clusters, each anchored in an unoccupied region of the card.
         The text block occupies roughly x 96–820, y 90–500; clusters sit
         in the remaining corners / right strip / bottom edge. */
      const clusters = [
        { cx: 1020, cy:  95, sx: 95, sy: 70,  n: 24, color: "#a04a31" }, // c0 terracotta — top-right
        { cx:  115, cy: 540, sx: 80, sy: 55,  n: 20, color: "#2f7a4e" }, // c1 forest      — bottom-left
        { cx: 1080, cy: 390, sx: 80, sy: 90,  n: 22, color: "#4763ad" }, // c2 slate blue  — mid-right
        { cx:  120, cy:  80, sx: 75, sy: 50,  n: 18, color: "#91487d" }, // c3 plum        — top-left
        { cx:  720, cy: 570, sx: 110, sy: 40, n: 22, color: "#7c662a" }, // c4 ochre       — bottom-center
      ];

      for (const cl of clusters) {
        for (let i = 0; i < cl.n; i++) {
          const x = cl.cx + randn() * cl.sx;
          const y = cl.cy + randn() * cl.sy;
          const r = 1.6 + rand() * 2.8;
          const a = 0.18 + rand() * 0.38;
          ctx.globalAlpha = a;
          ctx.fillStyle = cl.color;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, 6.2832);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    })();
  </script>
</body>
</html>
