<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
<style>
  .bg{fill:#f4f4f1}
  .c1{fill:#4763ad} .c2{fill:#2f7a4e} .c3{fill:#a04a31} .c4{fill:#7c662a} .c5{fill:#91487d}
  .ring{fill:none; stroke:#a04a31; stroke-width:1.4; opacity:.5}
  @media (prefers-color-scheme: dark){
    .bg{fill:#1b1b19}
    .c1{fill:#84a0e8} .c2{fill:#67ad85} .c3{fill:#d4805f} .c4{fill:#c7a35c} .c5{fill:#ca80b6}
    .ring{stroke:#d4805f; opacity:.45}
  }
</style>
<rect class="bg" width="64" height="64" rx="14"></rect>
<circle class="c1" cx="20" cy="23" r="6.5"></circle>
<circle class="c2" cx="33" cy="17" r="5"></circle>
<circle class="c3" cx="45" cy="27" r="7"></circle>
<circle class="c4" cx="23" cy="42" r="7"></circle>
<circle class="c5" cx="42" cy="46" r="5.5"></circle>
<circle class="ring" cx="45" cy="27" r="11.5"></circle>
</svg>
