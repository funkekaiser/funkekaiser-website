name: Validate CSP Hashes

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"
      - "impressum.html"
      - "404.html"
      - "_headers"

jobs:
  validate-hashes:
    runs-on: ubuntu-latest
    name: Check CSP hash consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Validate CSP hashes
        run: python3 update.py validate

