name: Validate CSP Hashes

on:
  push:
    branches: [main, master]
    paths:
      - "index.html"
      - "impressum.html"
      - "404.html"
      - "_headers"
  pull_request:
    paths:
      - "index.html"
      - "impressum.html"
      - "404.html"
      - "_headers"

jobs:
  validate-hashes:
    runs-on: ubuntu-latest
    name: Check CSP hash consistency

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Validate CSP hashes
        run: python3 update.py validate

      - name: Add comment on failure (pull_request only)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **CSP hashes are out of date!**\n\nInline scripts have changed but the `_headers` file was not updated.\n\nTo fix this locally, run:\n```bash\npython3 update.py hashes\n```\n\nThen commit and push the updated `_headers` file.'
            })
