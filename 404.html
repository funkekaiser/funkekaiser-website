<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>404 — Page not found · Jonathan Funke-Kaiser</title>
<meta name="robots" content="noindex" />

<meta name="color-scheme" content="light dark" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7" />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0b0e" />

<link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="images/favicon/favicon-180.png" />

<!-- Self-hosted fonts (no external CDN) -->
<link rel="preload" href="fonts/geist-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="fonts/geist-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
<style>
  /* ---------- shared foundation (inlined, formerly base.css) ----------
     Self-hosted fonts + brand palette + light/dark theme + reset + a11y.
     Inlined into <head> to drop the one render-blocking CSS request.
     NOTE: duplicated across index/impressum/404 — keep in sync when
     editing fonts or theme tokens. */
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url("fonts/geist-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist";
    font-style: normal;
    font-weight: 300 700;
    font-display: swap;
    src: url("fonts/geist-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: swap;
    src: url("fonts/geist-mono-latin.woff2") format("woff2");
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: "Geist Mono";
    font-style: normal;
    font-weight: 400 500;
    font-display: swap;
    src: url("fonts/geist-mono-latin-ext.woff2") format("woff2");
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  :root {
    --accent: #9a7bff;
    --accent2: #3fd2c7;
    --glow: 0.33;          /* 0..1 */
    --reveal: 44vmax;      /* spotlight radius */
    --bg: #f4f5f7;
    --bg-deep: #eceef1;
    --surface: rgba(20, 22, 28, 0.025);
    --surface-hover: rgba(20, 22, 28, 0.05);
    --border: rgba(20, 22, 28, 0.10);
    --text: #15171c;
    --text-weak: #5b6068;
    --text-faint: #6a6f77;          /* AA: 4.64:1 on --bg */
    --accent-ink: #6b4ad6;          /* accent at text contrast — AA: 5.38:1 on --bg */
    --on-accent: #0c0d10;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      --bg: #0a0b0e;
      --bg-deep: #060709;
      --surface: rgba(255, 255, 255, 0.028);
      --surface-hover: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.10);
      --text: #eceef2;
      --text-weak: #9aa0aa;
      --text-faint: #757c86;        /* AA: 4.67:1 on --bg */
      --accent-ink: #9a7bff;        /* accent already AA on dark — 6.23:1 */
      --on-accent: #0c0d10;
    }
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7; --bg-deep: #eceef1;
    --surface: rgba(20, 22, 28, 0.025); --surface-hover: rgba(20, 22, 28, 0.05);
    --border: rgba(20, 22, 28, 0.10);
    --text: #15171c; --text-weak: #5b6068; --text-faint: #6a6f77;
    --accent-ink: #6b4ad6;
    --on-accent: #0c0d10;
  }
  :root[data-theme="dark"] {
    --bg: #0a0b0e; --bg-deep: #060709;
    --surface: rgba(255, 255, 255, 0.028); --surface-hover: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.10);
    --text: #eceef2; --text-weak: #9aa0aa; --text-faint: #757c86;
    --accent-ink: #9a7bff;
    --on-accent: #0c0d10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible {
    outline: 2px solid var(--accent-ink);
    outline-offset: 3px;
    border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* ---------- page-specific ---------- */
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Geist", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* ---------- cursor-following gradient spotlight (same as homepage) ---------- */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg::before {
    content: "";
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(38% 42% at 26% 30%, var(--accent) 0%, transparent 62%),
      radial-gradient(40% 44% at 78% 72%, var(--accent2) 0%, transparent 64%);
    opacity: calc(var(--glow) * 0.32);
    filter: blur(30px) saturate(115%);
  }
  .bg-field {
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(38% 42% at 26% 30%, var(--accent) 0%, transparent 60%),
      radial-gradient(44% 48% at 80% 74%, var(--accent2) 0%, transparent 62%),
      radial-gradient(60% 60% at 50% 58%, color-mix(in oklch, var(--accent), var(--accent2)) 0%, transparent 72%);
    opacity: var(--glow);
    filter: blur(18px) saturate(135%);
    -webkit-mask-image: radial-gradient(circle var(--reveal) at var(--mx, 50%) var(--my, 42%), #000 0%, rgba(0,0,0,0.35) 42%, transparent 72%);
    mask-image: radial-gradient(circle var(--reveal) at var(--mx, 50%) var(--my, 42%), #000 0%, rgba(0,0,0,0.35) 42%, transparent 72%);
    will-change: mask-position;
  }
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 120% at 50% 50%, transparent 40%, var(--bg-deep) 100%);
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-field { -webkit-mask-image: none; mask-image: none; opacity: calc(var(--glow) * 0.5); }
  }

  /* ---------- fine grid texture ---------- */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(color-mix(in oklch, currentColor 4%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklch, currentColor 4%, transparent) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(120% 120% at 50% 50%, #000 20%, transparent 80%);
    mask-image: radial-gradient(120% 120% at 50% 50%, #000 20%, transparent 80%);
  }

  /* ---------- layout ---------- */
  main {
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 7vw, 8rem);
    max-width: 760px;
  }

  .eyebrow {
    font-family: "Geist Mono", monospace;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.4rem;
    animation: fade-up 0.55s cubic-bezier(.2, .7, .3, 1) 0.04s both;
  }
  .eyebrow::before {
    content: "";
    width: 26px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  h1 {
    font-size: clamp(2.6rem, 8vw, 4.9rem);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.98;
    margin-bottom: 1.2rem;
    animation: fade-up 0.55s cubic-bezier(.2, .7, .3, 1) 0.12s both;
  }

  .tagline {
    font-size: clamp(1.05rem, 2.4vw, 1.2rem);
    color: var(--text-weak);
    line-height: 1.5;
    max-width: 38ch;
    margin-bottom: 2.4rem;
    animation: fade-up 0.55s cubic-bezier(.2, .7, .3, 1) 0.22s both;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "Geist Mono", monospace;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    color: var(--accent-ink);
    text-decoration: none;
    border: 1px solid color-mix(in oklch, var(--accent-ink) 35%, transparent);
    border-radius: 10px;
    padding: 0.65rem 1.1rem;
    background: color-mix(in oklch, var(--accent) 6%, transparent);
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    animation: fade-up 0.55s cubic-bezier(.2, .7, .3, 1) 0.34s both;
  }
  .home-link:hover {
    background: color-mix(in oklch, var(--accent) 12%, transparent);
    border-color: color-mix(in oklch, var(--accent-ink) 60%, transparent);
    transform: translateX(-2px);
  }
  .home-link svg { width: 14px; height: 14px; flex: none; }

  footer {
    position: fixed;
    left: clamp(2rem, 7vw, 8rem);
    bottom: clamp(1.4rem, 4vh, 2.4rem);
    z-index: 1;
    font-family: "Geist Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }
  footer a { color: var(--text-faint); text-decoration: none; transition: color 0.2s ease; }
  footer a:hover { color: var(--accent-ink); }
  .footer-sep { opacity: 0.5; margin: 0 0.5rem; }

  @media (max-width: 560px) {
    footer { position: static; margin-top: 2rem; padding: 0 clamp(2rem,7vw,8rem); }
    body { overflow-y: auto; }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg-field"></div>
    <div class="grid"></div>
  </div>

  <main id="main">
    <p class="eyebrow">404</p>
    <h1>Page not<br />found.</h1>
    <p class="tagline">This page doesn't exist (or has moved). You can head back to the homepage.</p>
    <a class="home-link" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      Back to funkekaiser.com
    </a>
  </main>

  <footer>© <span id="year"></span> Jonathan Funke-Kaiser<span class="footer-sep">·</span><a href="impressum.html">Impressum &amp; Datenschutz</a></footer>

  <script>
    (function () {
      document.getElementById("year").textContent = new Date().getFullYear();
      const root = document.documentElement;
      let tx = 50, ty = 42, cx = 50, cy = 42, raf = null;
      function loop() {
        cx += (tx - cx) * 0.12;
        cy += (ty - cy) * 0.12;
        root.style.setProperty("--mx", cx.toFixed(2) + "%");
        root.style.setProperty("--my", cy.toFixed(2) + "%");
        if (Math.abs(tx - cx) > 0.05 || Math.abs(ty - cy) > 0.05) {
          raf = requestAnimationFrame(loop);
        } else { raf = null; }
      }
      function move(x, y) {
        tx = (x / window.innerWidth) * 100;
        ty = (y / window.innerHeight) * 100;
        if (!raf) raf = requestAnimationFrame(loop);
      }
      window.addEventListener("pointermove", (e) => move(e.clientX, e.clientY), { passive: true });
      window.addEventListener("pointerdown", (e) => move(e.clientX, e.clientY), { passive: true });
      root.style.setProperty("--mx", "50%");
      root.style.setProperty("--my", "42%");
    })();
  </script>
</body>
</html>
